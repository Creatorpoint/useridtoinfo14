<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telegram User Lookup</title>

<style>
body{
  margin:0;
  font-family:monospace;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#111;
  padding:30px;
  border-radius:14px;
  width:95%;
  max-width:500px;
  box-shadow:0 15px 40px rgba(0,0,0,0.6);
  color:white;
}

h2{
  text-align:center;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:14px;
  border-radius:8px;
  border:none;
  margin-bottom:15px;
  font-size:16px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:8px;
  background:#00c6ff;
  color:black;
  font-weight:bold;
  cursor:pointer;
  margin-bottom:10px;
}

button:hover{
  background:#0072ff;
  color:white;
}

pre{
  background:#1c1c1c;
  padding:15px;
  border-radius:8px;
  max-height:250px;
  overflow:auto;
  font-size:13px;
}
</style>
</head>

<body>

<div class="card">
  <h2>Telegram User Lookup API</h2>

  <input type="text" id="userid" placeholder="Enter User ID (Example: 5889016144)">
  
  <button onclick="searchUser()">Search</button>
  <button onclick="copyResult()">Copy JSON</button>

  <pre id="result">Result will appear here in JSON format...</pre>
</div>

<script>
async function searchUser(){
  const userid = document.getElementById("userid").value.trim();
  const resultBox = document.getElementById("result");

  if(!userid){
    alert("Enter User ID");
    return;
  }

  resultBox.textContent = "Loading...";

  try{
    const response = await fetch(`/api/search?userid=${userid}`);
    const data = await response.json();

    resultBox.textContent = JSON.stringify(data, null, 2);

  }catch(error){
    resultBox.textContent = "API Error";
  }
}

function copyResult(){
  const text = document.getElementById("result").textContent;
  navigator.clipboard.writeText(text);
  alert("JSON Copied!");
}
</script>

</body>
</html>
