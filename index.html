<!DOCTYPE html>
<html>
<head>
<title>Telegram Lookup</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#1f4037,#99f2c8);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:#111;
  padding:30px;
  border-radius:12px;
  width:95%;
  max-width:400px;
  box-shadow:0 0 20px rgba(0,0,0,0.6);
  color:white;
}

h2{
  text-align:center;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:none;
  margin-bottom:15px;
  font-size:16px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#00c6ff;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#0072ff;
}

.result{
  margin-top:20px;
  background:#1c1c1c;
  padding:15px;
  border-radius:8px;
}
</style>
</head>
<body>

<div class="container">
  <h2>Telegram User Lookup</h2>

  <input type="text" id="userid" placeholder="Enter Telegram User ID">
  <button onclick="searchUser()">Search</button>

  <div class="result" id="result">
    Result will appear here
  </div>
</div>

<script>
async function searchUser(){
  const userid = document.getElementById("userid").value;
  const resultBox = document.getElementById("result");

  if(!userid){
    alert("Enter User ID");
    return;
  }

  resultBox.innerHTML = "Searching...";

  try{
    const response = await fetch(`https://tg-2-num-api-org.vercel.app/api/search?userid=${userid}`);
    const data = await response.json();

    if(data.success){
      resultBox.innerHTML = `
        <p><b>Name:</b> ${data.name || "N/A"}</p>
        <p><b>Username:</b> ${data.username || "N/A"}</p>
        <p><b>Phone:</b> ${data.phone || "Not Found"}</p>
      `;
    } else {
      resultBox.innerHTML = "User Not Found";
    }

  }catch(error){
    resultBox.innerHTML = "API Error";
  }
}
</script>

</body>
</html>
