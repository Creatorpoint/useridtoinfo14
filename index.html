<!DOCTYPE html>
<html>
<head>
<title>Prime Prem</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">

<h2>Prime Prem</h2>

<p id="userEmail"></p>
<p>Daily Free: <span id="daily"></span></p>
<p>Credits: <span id="credits"></span></p>

<button id="useBtn">Use Service</button>

<div id="broadcasts"></div>

</div>

<script type="module">

import { auth, db, provider } from './firebase.js';
import { signInWithPopup, onAuthStateChanged } from 
"https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import { doc, getDoc, setDoc, updateDoc, 
collection, onSnapshot } from 
"https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

onAuthStateChanged(auth, async(user)=>{

 if(!user){
   await signInWithPopup(auth, provider);
 }

 const userRef = doc(db,"users",user.uid);
 const snap = await getDoc(userRef);

 if(!snap.exists()){
   await setDoc(userRef,{
     email:user.email,
     dailyFree:2,
     credits:0,
     blocked:false,
     online:true,
     lastReset:Date.now()
   });
 }

 loadUser(user.uid);
});

async function loadUser(uid){
 const snap = await getDoc(doc(db,"users",uid));
 const data = snap.data();

 if(data.blocked){
   alert("You are blocked by admin.");
   return;
 }

 document.getElementById("daily").innerText = data.dailyFree;
 document.getElementById("credits").innerText = data.credits;
}

</script>

</body>
</html>
