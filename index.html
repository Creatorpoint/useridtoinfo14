<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telegram Lookup Pro</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0a0a0a;
  font-family:Arial;
  color:white;
}

.card{
  text-align:center;
  background:#111;
  padding:30px;
  border-radius:20px;
  width:95%;
  max-width:420px;
  box-shadow:0 0 40px rgba(0,0,0,0.8);
}

.avatar{
  width:130px;
  height:130px;
  border-radius:50%;
  margin:auto;
  background:url("https://files.catbox.moe/rfsmvd.jpg") center/cover;
  border:5px solid #00f0ff;
  box-shadow:0 0 25px #00f0ff;
  transition:0.4s;
}

.glow-searching{
  animation: neonBlue 1s infinite alternate;
}

.glow-success{
  box-shadow:0 0 30px #00ff00;
  border-color:#00ff00;
}

.glow-error{
  box-shadow:0 0 30px red;
  border-color:red;
}

@keyframes neonBlue{
  from { box-shadow:0 0 10px #00f0ff; }
  to { box-shadow:0 0 35px #00f0ff; }
}

input{
  width:100%;
  padding:14px;
  border-radius:8px;
  border:none;
  margin-top:20px;
  font-size:16px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:8px;
  background:#00f0ff;
  margin-top:15px;
  font-weight:bold;
  cursor:pointer;
}

pre{
  margin-top:20px;
  background:#1c1c1c;
  padding:15px;
  border-radius:8px;
  max-height:200px;
  overflow:auto;
  font-size:13px;
}
</style>
</head>

<body>

<div class="card">

  <div id="avatar" class="avatar"></div>

  <input type="text" id="userid" placeholder="Enter User ID">
  <button onclick="searchUser()">Search</button>

  <pre id="result">JSON result will appear here...</pre>

</div>

<script>
async function searchUser(){

  const userid = document.getElementById("userid").value.trim();
  const resultBox = document.getElementById("result");
  const avatar = document.getElementById("avatar");

  if(!userid){
    alert("Enter User ID");
    return;
  }

  avatar.className = "avatar glow-searching";
  resultBox.textContent = "Searching...";

  try{

    const response = await fetch(`/api/search?userid=${userid}`);
    const data = await response.json();

    if(response.ok){

      avatar.className = "avatar glow-success";
      resultBox.textContent = JSON.stringify(data, null, 2);

    } else {

      avatar.className = "avatar glow-error";
      resultBox.textContent = "User Not Found";

    }

  }catch(error){

    avatar.className = "avatar glow-error";
    resultBox.textContent = "API Error";

  }
}
</script>

</body>
</html>
